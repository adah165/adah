<svg
  viewBox="0 0 200 240"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  {/* Bounding group for the icon, shifted slightly to center horizontally */}
  <g transform="translate(10, 15)">
    {/* Blue shape (Right leg, Left leg top, and Apex - Main Arch) */}
    <path
      d="M 68 145 C 68 100 80 45 109 45 C 138 45 132 100 132 145"
      stroke="#75b5e9"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    {/* Green Arrow Stem */}
    <path
      d="M 117 83 L 145 55"
      stroke="#86d7ab"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    {/* Green Arrow Head (Chevron pointing up-right) */}
